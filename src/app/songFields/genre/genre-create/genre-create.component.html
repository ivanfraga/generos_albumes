<h2>Genera un Género musical</h2>
<form [formGroup]="genreForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="mb-3">
        <label class="form-label">Nombre del género musical</label>
        <input formControlName="name" type="text" class="form-control" required>
    </div>
    <div class="mb-3">    
        <label class="form-label">Autor</label>
        <input formControlName="author" type="text" class="form-control" required>
    </div>
    
    <button [disabled]="!genreForm.valid" type="submit" class="btn btn-primary">Save</button>
        
    
</form>
