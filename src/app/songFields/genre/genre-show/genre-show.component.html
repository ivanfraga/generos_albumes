<h2>Component SHOW is good</h2>
<div class="d-grip gap-2 mt-12">
    <a routerLink="/genrecreate" class="btn btn-primary btn-lg btn-block" type="button">Create</a>
</div>
<div>
    <a routerLink="/showalbums" class="btn btn-primary btn-lg btn-block" type="button">Albumes</a>
</div>
<div>
    <h2>Generos musicales</h2>
</div>
<table class="table table-hover table-striped">
    <thead class="bg-dark text-white">
        <tr>
            <th>Nombre</th>
            <th>Autor</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let genre of Genre">
            <td>{{genre.name}}</td>
            <td>{{genre.author}}</td>
            <td>
                <button routerLink="/genreedit/{{genre.id}}" class="btn btn-outline-secondary">Actualizar</button>
                <button (click)="deleteRow(genre)" class="btn btn-outline-danger">Eliminar</button>
                
            </td>

        </tr>
    </tbody>
</table>
