<h2>Genera un Album musical</h2>
<form [formGroup]="albumForm" (ngSubmit)="onSubmit()" novalidate>
    <div class="mb-3">
        <label class="form-label">Nombre del álbum musical</label>
        <input formControlName="name" type="text" class="form-control" required>
    </div>
    <div class="mb-3">    
        <label class="form-label">Año</label>
        <input formControlName="year" type="number" class="form-control" required>
    </div>
    <div class="add">
        <input 
            type="file"
            #file
            class="input-file"
            (change)="onFilesAdded($event.target)"
        />
        <img (click)="addFiles()" class="upload" [src]="url" alt="" />
    </div>
    
    <button [disabled]="!albumForm.valid" type="submit" class="btn btn-primary">Save</button>
        
    
</form>
